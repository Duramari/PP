version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: dialbee_postgres
    environment:
      POSTGRES_DB: dialbee
      POSTGRES_USER: dialbee
      POSTGRES_PASSWORD: dialbee_pass_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dialbee_redis
    command: redis-server --requirepass dialbee_redis_2024
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dialbee_api
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://dialbee:dialbee_pass_2024@postgres:5432/dialbee
      REDIS_URL: redis://:dialbee_redis_2024@redis:6379
      ELASTICSEARCH_URL: http://localhost:9200
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dialbee_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
