<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bG" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#F5A800"/>
    </radialGradient>
    <radialGradient id="hG" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#F0A000"/>
    </radialGradient>
    <linearGradient id="wG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#BBDEFB" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- BG circle -->
  <circle cx="32" cy="32" r="31" fill="#FFFDE7" stroke="#F5C800" stroke-width="1.5"/>

  <!-- Wings -->
  <ellipse cx="18" cy="20" rx="12" ry="7" transform="rotate(-30 18 20)" fill="url(#wG)" stroke="#90CAF9" stroke-width="0.8" opacity="0.9"/>
  <ellipse cx="46" cy="20" rx="12" ry="7" transform="rotate(30 46 20)" fill="url(#wG)" stroke="#90CAF9" stroke-width="0.8" opacity="0.9"/>

  <!-- Body -->
  <ellipse cx="32" cy="40" rx="11" ry="14" fill="url(#bG)" stroke="#E08000" stroke-width="1.2"/>
  <clipPath id="c1"><ellipse cx="32" cy="40" rx="11" ry="14"/></clipPath>
  <rect x="21" y="35" width="22" height="4" fill="#1A1A1A" clip-path="url(#c1)" opacity="0.85"/>
  <rect x="21" y="42" width="22" height="4" fill="#1A1A1A" clip-path="url(#c1)" opacity="0.85"/>

  <!-- B -->
  <text x="32" y="43" font-family="Arial Black,sans-serif" font-size="8" font-weight="900"
    text-anchor="middle" fill="#1A1A1A" opacity="0.9">B</text>

  <!-- Stinger -->
  <path d="M 30 53 L 32 58 L 34 53" fill="#E08000"/>

  <!-- Head -->
  <ellipse cx="32" cy="25" rx="9" ry="8.5" fill="url(#hG)" stroke="#E08000" stroke-width="1.2"/>

  <!-- Antennae -->
  <path d="M 28 18 Q 24 12 22 8" stroke="#1A1A1A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <circle cx="21.5" cy="7" r="2" fill="#1A1A1A" stroke="#F5A800" stroke-width="1"/>
  <path d="M 36 18 Q 40 12 42 8" stroke="#1A1A1A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <circle cx="42.5" cy="7" r="2" fill="#1A1A1A" stroke="#F5A800" stroke-width="1"/>

  <!-- Eyes -->
  <ellipse cx="27" cy="25" rx="2.5" ry="3" fill="#1A1A1A"/>
  <circle cx="26.2" cy="24" r="0.9" fill="white" opacity="0.9"/>
  <ellipse cx="37" cy="25" rx="2.5" ry="3" fill="#1A1A1A"/>
  <circle cx="36.2" cy="24" r="0.9" fill="white" opacity="0.9"/>

  <!-- Smile -->
  <path d="M 28 30 Q 32 33 36 30" stroke="#1A1A1A" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Legs -->
  <line x1="21" y1="37" x2="14" y2="41" stroke="#1A1A1A" stroke-width="1" stroke-linecap="round"/>
  <line x1="21" y1="42" x2="13" y2="46" stroke="#1A1A1A" stroke-width="1" stroke-linecap="round"/>
  <line x1="43" y1="37" x2="50" y2="41" stroke="#1A1A1A" stroke-width="1" stroke-linecap="round"/>
  <line x1="43" y1="42" x2="51" y2="46" stroke="#1A1A1A" stroke-width="1" stroke-linecap="round"/>
</svg>
