<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">
  <defs>
    <radialGradient id="bodyG" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#F5A800"/>
    </radialGradient>
    <radialGradient id="headG" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#F0A000"/>
    </radialGradient>
    <linearGradient id="wingG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#BBDEFB" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="stripeG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#F5A800" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect x="0" y="0" width="520" height="140" rx="24" fill="#FFFDE7"/>
  <rect x="1.5" y="1.5" width="517" height="137" rx="23" fill="none" stroke="#F5C800" stroke-width="2.5"/>

  <!-- ══ BEE (scaled to fit) ══ -->
  <!-- Wings left top -->
  <ellipse cx="68" cy="46" rx="28" ry="16" transform="rotate(-30 68 46)"
    fill="url(#wingG)" stroke="#90CAF9" stroke-width="1" opacity="0.9"/>
  <!-- Wings left bottom -->
  <ellipse cx="60" cy="68" rx="20" ry="11" transform="rotate(-15 60 68)"
    fill="url(#wingG)" stroke="#90CAF9" stroke-width="0.8" opacity="0.75"/>
  <!-- Wings right top -->
  <ellipse cx="112" cy="46" rx="28" ry="16" transform="rotate(30 112 46)"
    fill="url(#wingG)" stroke="#90CAF9" stroke-width="1" opacity="0.9"/>
  <!-- Wings right bottom -->
  <ellipse cx="120" cy="68" rx="20" ry="11" transform="rotate(15 120 68)"
    fill="url(#wingG)" stroke="#90CAF9" stroke-width="0.8" opacity="0.75"/>

  <!-- Body -->
  <ellipse cx="90" cy="94" rx="29" ry="36" fill="url(#bodyG)" stroke="#E08000" stroke-width="1.8" filter="url(#sh)"/>
  <clipPath id="bC"><ellipse cx="90" cy="94" rx="29" ry="36"/></clipPath>
  <rect x="61" y="83" width="58" height="10" fill="url(#stripeG)" clip-path="url(#bC)" opacity="0.88"/>
  <rect x="61" y="101" width="58" height="10" fill="url(#stripeG)" clip-path="url(#bC)" opacity="0.88"/>
  <rect x="61" y="118" width="58" height="9" fill="url(#stripeG)" clip-path="url(#bC)" opacity="0.75"/>

  <!-- B letter on body -->
  <text x="90" y="105" font-family="Arial Black,sans-serif" font-size="20" font-weight="900"
    text-anchor="middle" fill="#1A1A1A" opacity="0.82">B</text>

  <!-- Stinger -->
  <path d="M 85 128 L 90 142 L 95 128" fill="#E08000" stroke="#C06000" stroke-width="0.8"/>

  <!-- Head -->
  <ellipse cx="90" cy="57" rx="24" ry="22" fill="url(#headG)" stroke="#E08000" stroke-width="1.8" filter="url(#sh)"/>

  <!-- Antennae -->
  <path d="M 80 38 Q 72 26 67 18" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="66" cy="16" r="3.5" fill="#1A1A1A" stroke="#F5A800" stroke-width="1.5"/>
  <circle cx="66" cy="16" r="1.5" fill="#FFD700"/>

  <path d="M 100 38 Q 108 26 113 18" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="114" cy="16" r="3.5" fill="#1A1A1A" stroke="#F5A800" stroke-width="1.5"/>
  <circle cx="114" cy="16" r="1.5" fill="#FFD700"/>

  <!-- Eyes -->
  <ellipse cx="80" cy="57" rx="6" ry="7" fill="#1A1A1A"/>
  <circle cx="78.5" cy="55" r="2" fill="white" opacity="0.9"/>
  <ellipse cx="100" cy="57" rx="6" ry="7" fill="#1A1A1A"/>
  <circle cx="98.5" cy="55" r="2" fill="white" opacity="0.9"/>

  <!-- Smile -->
  <path d="M 82 68 Q 90 74 98 68" stroke="#1A1A1A" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Legs left -->
  <line x1="62" y1="88" x2="44" y2="97" stroke="#1A1A1A" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="62" y1="98" x2="42" y2="107" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="63" y1="108" x2="44" y2="116" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Legs right -->
  <line x1="118" y1="88" x2="136" y2="97" stroke="#1A1A1A" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="118" y1="98" x2="138" y2="107" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="117" y1="108" x2="136" y2="116" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ══ BRAND TEXT ══ -->
  <!-- "dial" in dark -->
  <text x="165" y="90"
    font-family="Arial Black, Helvetica Neue, sans-serif"
    font-size="56"
    font-weight="900"
    fill="#1A1A1A"
    letter-spacing="-1">dial</text>

  <!-- "bee" in yellow/orange -->
  <text x="298" y="90"
    font-family="Arial Black, Helvetica Neue, sans-serif"
    font-size="56"
    font-weight="900"
    fill="#F5A800"
    letter-spacing="-1">bee</text>

  <!-- Tagline -->
  <text x="167" y="114"
    font-family="Arial, Helvetica, sans-serif"
    font-size="13"
    font-weight="500"
    fill="#888"
    letter-spacing="2">FIND LOCAL BUSINESSES</text>

  <!-- Small bee dots decoration -->
  <circle cx="163" cy="43" r="3" fill="#F5A800" opacity="0.5"/>
  <circle cx="172" cy="35" r="2" fill="#F5A800" opacity="0.35"/>
  <circle cx="158" cy="32" r="1.5" fill="#F5A800" opacity="0.3"/>

</svg>
