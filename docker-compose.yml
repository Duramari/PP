version: '3.9'

services:
  # ── PostgreSQL + PostGIS ──────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: dialbee_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dialbee
      POSTGRES_USER: dialbee
      POSTGRES_PASSWORD: dialbee_pass_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dialbee -d dialbee"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dialbee_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass dialbee_redis_2024
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dialbee_redis_2024", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Elasticsearch ─────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.11.1
    container_name: dialbee_es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── NestJS API ────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: dialbee_api
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://dialbee:dialbee_pass_2024@postgres:5432/dialbee
      REDIS_URL: redis://:dialbee_redis_2024@redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    command: npm run start:dev

  # ── Next.js Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: dialbee_frontend
    restart: unless-stopped
    env_file: ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    command: npm run dev

  # ── Mailhog (local email testing) ─────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: dialbee_mail
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  postgres_data:
  redis_data:
  es_data:
